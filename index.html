<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engaja Elite</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0a0a0a;
    color: #fff;
    overflow: hidden;
}

/* FUNDO AURA LUXO */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at center, rgba(255,215,0,0.08), transparent 60%);
    animation: luzFundo 12s linear infinite;
    z-index: 0;
}

@keyframes luzFundo {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* PARTÍCULAS */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: 0;
}

.bg span {
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: white;
    box-shadow: 0 0 10px white, 0 0 25px gold;
    animation: brilho 8s linear infinite;
    opacity: 0;
}

@keyframes brilho {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}

/* CENTRAL */
.wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    z-index: 1;
    position: relative;
}

/* CARD */
.container {
    text-align: center;
    background: rgba(17,17,17,0.85);
    padding: 30px;
    border-radius: 20px;
    width: 90%;
    max-width: 350px;

    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.05);

    animation: entrada 1.5s ease forwards;
}

@keyframes entrada {
    from {
        opacity: 0;
        transform: scale(0.8) translateY(80px);
        filter: blur(20px);
    }
    to {
        opacity: 1;
        transform: scale(1) translateY(0);
        filter: blur(0);
    }
}

/* IMAGENS */
.group-img {
    width: 100%;
    border-radius: 12px;
    margin-bottom: 10px;
    border: 1px solid #333;
}

/* TÍTULO LUXO */
h2 {
    font-size: 22px;
    letter-spacing: 2px;
    background: linear-gradient(90deg, gold, white, gold);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: brilhoTexto 4s linear infinite;
}

@keyframes brilhoTexto {
    0% { background-position: 0%; }
    100% { background-position: 200%; }
}

p {
    color: #aaa;
    font-size: 14px;
}

/* BOTÕES */
.btn {
    display: block;
    margin: 10px 0 20px;
    padding: 12px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    background: #111;
    position: relative;
    overflow: hidden;

    box-shadow: 0 0 10px rgba(255,255,255,0.1);
    transition: 0.3s;
}

/* TEXTO INTERNO */
.btn span {
    position: relative;
    z-index: 2;
}

/* BRILHO PASSANDO */
.btn::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
    transform: skewX(-25deg);
    transition: 0.5s;
}

.btn:hover::before {
    left: 120%;
}

/* BORDA NEON */
.btn::after {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 14px;
    animation: girar 4s linear infinite;
    z-index: -1;
}

@keyframes girar {
    100% { transform: rotate(360deg); }
}

/* VARIAÇÕES */
.imperio::after {
    background: conic-gradient(transparent, gold, #ffd700, gold, transparent);
}

.diamond::after {
    background: conic-gradient(transparent, #fff, #ccc, #fff, transparent);
}

/* HOVER */
.imperio:hover {
    box-shadow: 0 0 25px gold, 0 0 50px rgba(255,215,0,0.5);
    transform: scale(1.05);
}

.diamond:hover {
    box-shadow: 0 0 25px #fff, 0 0 50px rgba(255,255,255,0.4);
    transform: scale(1.05);
}

/* PARCERIA */
.parceria {
    border: 1px solid gold;
}

.parceria:hover {
    box-shadow: 0 0 25px gold;
}

/* FOOTER */
.footer {
    font-size: 12px;
    color: #777;
    margin-top: 10px;
}
</style>
</head>

<body>

<!-- FUNDO -->

    <!-- GRUPO 2 -->

        Exclusivo • Premium • Limitado

</div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engaja Elite</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: #0a0a0a;
        overflow: hidden;
        color: #fff;
    }

    /* FUNDO COM BRILHOS */
    .sparkles {
        position: fixed;
        width: 100%;
        height: 100%;
        overflow: hidden;
        z-index: 0;
    }

    .sparkles span {
        position: absolute;
        display: block;
        width: 3px;
        height: 3px;
        background: white;
        border-radius: 50%;
        box-shadow: 0 0 10px white, 0 0 20px gold;
        animation: animate 10s linear infinite;
        opacity: 0;
    }

    @keyframes animate {
        0% {
            transform: translateY(100vh) scale(0);
            opacity: 0;
        }
        20% {
            opacity: 1;
        }
        100% {
            transform: translateY(-10vh) scale(1);
            opacity: 0;
        }
    }

    /* CONTAINER */
    .container {
        position: relative;
        z-index: 1;
        text-align: center;
        background: rgba(17,17,17,0.9);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 0 40px rgba(0,0,0,0.8);
        max-width: 350px;
        width: 90%;
        margin: auto;
        top: 50%;
        transform: translateY(-50%);
    }

    h1 {
        letter-spacing: 2px;
    }

    p {
        color: #aaa;
        margin-bottom: 25px;
    }

    .btn {
        display: block;
        text-decoration: none;
        padding: 15px;
        margin: 10px 0;
        border-radius: 10px;
        font-weight: bold;
        transition: 0.3s;
        color: #fff;
    }

    .imperio {
        border: 1px solid gold;
    }

    .diamond {
        border: 1px solid #ccc;
    }

    .btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 15px gold;
    }

    .footer {
        margin-top: 15px;
        font-size: 12px;
        color: #777;
    }
</style>
</head>

<body>

<div class="sparkles">
    <!-- GERAR VÁRIOS BRILHOS -->
    <span style="left:10%; animation-delay:0s;"></span>
    <span style="left:20%; animation-delay:2s;"></span>
    <span style="left:30%; animation-delay:4s;"></span>
    <span style="left:40%; animation-delay:1s;"></span>
    <span style="left:50%; animation-delay:3s;"></span>
    <span style="left:60%; animation-delay:5s;"></span>
    <span style="left:70%; animation-delay:2s;"></span>
    <span style="left:80%; animation-delay:4s;"></span>
    <span style="left:90%; animation-delay:1s;"></span>
</div>

<div class="container">
    <h1>👑 ENGAJA ELITE</h1>
    <p>Acesso ao crescimento de alto nível</p>

    <a class="btn imperio" href="https://chat.whatsapp.com/BoAkDPaMuJG0VwU2vrlkWU?mode=gi_t" target="_blank">
        🔱 ENGAJA IMPÉRIO
    </a>

    <a class="btn diamond" href="https://chat.whatsapp.com/LwMSLguzrxCDD9lrpl3bC4" target="_blank">
        💎 ENGAJA DIAMOND
    </a>

    <div class="footer">
        Exclusivo • Premium • Limitado
    </div>
</div>

</body>
</html>

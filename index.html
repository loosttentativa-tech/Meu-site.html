<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENGAJA ELITE</title>

<link rel="icon" href="https://storageblack.cloud/midia/1773117490092.jpg">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #050505;
    color: #fff;
    overflow-x: hidden;
}

/* LOADER PREMIUM */
.loader {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
}

.loader h1 {
    font-size: 30px;
    letter-spacing: 4px;
    background: linear-gradient(90deg, gold, white, gold);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: brilho 2s linear infinite;
}

@keyframes brilho {
    0% { background-position: 0%; }
    100% { background-position: 200%; }
}

/* FUNDO SUAVE */
body::before {
    content: "";
    position: fixed;
    width: 150%;
    height: 150%;
    background: radial-gradient(circle, rgba(255,215,0,0.05), transparent 60%);
    animation: girarBg 25s linear infinite;
    z-index: -1;
}

@keyframes girarBg {
    100% { transform: rotate(360deg); }
}

/* PARTÍCULAS */
.bg span {
    position: absolute;
    width: 3px;
    height: 3px;
    background: white;
    border-radius: 50%;
    box-shadow: 0 0 10px gold;
    animation: subir linear infinite;
}

@keyframes subir {
    0% { transform: translateY(100vh); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}

/* CENTRAL */
.wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* CARD */
.container {
    width: 90%;
    max-width: 360px;
    padding: 25px;
    border-radius: 20px;
    background: rgba(20,20,20,0.8);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.05);
    text-align: center;
    animation: entrar 1.2s ease;
}

@keyframes entrar {
    from {
        opacity: 0;
        transform: translateY(80px) scale(0.9);
        filter: blur(10px);
    }
}

/* TABS */
.tabs {
    display: flex;
    margin-bottom: 15px;
}

.tab {
    flex: 1;
    padding: 10px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: 0.3s;
}

.tab.active {
    border-color: gold;
    color: gold;
}

/* CONTEÚDO COM ANIMAÇÃO */
.content {
    display: none;
    opacity: 0;
    transform: translateY(10px);
    transition: 0.4s;
}

.content.active {
    display: block;
    opacity: 1;
    transform: translateY(0);
}

/* IMAGEM */
.group-img {
    width: 110px;
    height: 110px;
    object-fit: cover;
    border-radius: 50%;
    margin: 10px auto;
    display: block;
    box-shadow: 0 0 20px rgba(255,255,255,0.1);
}

/* BOTÕES BASE */
.btn {
    position: relative;
    display: block;
    margin: 12px 0 20px;
    padding: 12px;
    border-radius: 12px;
    background: #111;
    color: #fff;
    text-decoration: none;
    overflow: hidden;
    transition: 0.3s;
}

/* HOVER 3D */
.btn:hover {
    transform: scale(1.06) translateY(-3px);
}

/* CLICK */
.btn:active {
    transform: scale(0.95);
}

/* BRILHO PASSANDO */
.btn::before {
    content: "";
    position: absolute;
    width: 60%;
    height: 100%;
    top: 0;
    left: -100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.6), transparent);
    transform: skewX(-20deg);
}

.btn:hover::before {
    animation: brilhoBtn 0.8s forwards;
}

@keyframes brilhoBtn {
    to { left: 120%; }
}

/* GLOW ANIMADO */
.imperio {
    box-shadow: 0 0 10px gold;
    animation: glowGold 2s infinite alternate;
}

@keyframes glowGold {
    from { box-shadow: 0 0 10px gold; }
    to { box-shadow: 0 0 25px gold; }
}

.diamond {
    box-shadow: 0 0 10px white;
    animation: glowWhite 2s infinite alternate;
}

@keyframes glowWhite {
    from { box-shadow: 0 0 10px white; }
    to { box-shadow: 0 0 25px white; }
}

/* PARCERIA */
.parceria {
    border: 1px solid gold;
}

/* FOOTER */
.footer {
    font-size: 12px;
    color: #777;
}
</style>
</head>

<body>

<div class="loader">
    <h1>ENGAJA ELITE</h1>
</div>

<div class="bg"></div>

<div class="wrapper">
<div class="container">

<h2>👑 ENGAJA ELITE</h2>

<div class="tabs">
    <div class="tab active" onclick="trocar(0)">Grupos</div>
    <div class="tab" onclick="trocar(1)">Parceria</div>
</div>

<div class="content active">
    <img class="group-img" src="https://storageblack.cloud/midia/1777331201682.jpg">
    <a class="btn imperio" href="#" target="_blank">🔱 ENGAJA IMPÉRIO</a>

    <img class="group-img" src="https://storageblack.cloud/midia/1777330978711.jpg">
    <a class="btn diamond" href="#" target="_blank">💎 ENGAJA DIAMOND</a>
</div>

<div class="content">
    <p>Quer crescer junto com a Elite?</p>
    <a class="btn parceria" href="https://wa.me/557588379574" target="_blank">
        🤝 Falar comigo
    </a>
</div>

<div class="footer">by: wa.me/marcos</div>

</div>
</div>

<script>
/* REMOVER LOADER */
setTimeout(() => {
    document.querySelector(".loader").style.opacity = "0";
    setTimeout(() => {
        document.querySelector(".loader").remove();
    }, 500);
}, 2000);

/* PARTÍCULAS DINÂMICAS */
const bg = document.querySelector(".bg");

for(let i=0;i<25;i++){
    let span = document.createElement("span");
    span.style.left = Math.random()*100+"%";
    span.style.animationDuration = (5 + Math.random()*5)+"s";
    span.style.opacity = Math.random();
    bg.appendChild(span);
}

/* TROCAR ABA */
function trocar(i){
    let tabs = document.querySelectorAll(".tab");
    let content = document.querySelectorAll(".content");

    tabs.forEach(t => t.classList.remove("active"));
    content.forEach(c => c.classList.remove("active"));

    tabs[i].classList.add("active");
    content[i].classList.add("active");
}

/* RIPPLE EFFECT */
document.querySelectorAll(".btn").forEach(btn => {
    btn.addEventListener("click", function(e){
        let ripple = document.createElement("span");
        ripple.style.position = "absolute";
        ripple.style.width = ripple.style.height = "100px";
        ripple.style.background = "rgba(255,255,255,0.3)";
        ripple.style.borderRadius = "50%";
        ripple.style.left = e.offsetX - 50 + "px";
        ripple.style.top = e.offsetY - 50 + "px";
        ripple.style.animation = "ripple 0.6s linear";
        this.appendChild(ripple);

        setTimeout(()=> ripple.remove(),600);
    });
});

/* ANIMAÇÃO RIPPLE */
const style = document.createElement('style');
style.innerHTML = `
@keyframes ripple {
    from { transform: scale(0); opacity: 1; }
    to { transform: scale(3); opacity: 0; }
}`;
document.head.appendChild(style);
</script>

</body>
                                        </html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surpresa!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000; /* Fundo Preto */
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Corações brilhantes de fundo em movimento */
        .background-hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .heart {
            position: absolute;
            color: #ff6bdf;
            text-shadow: 0 0 10px #ff6bdf, 0 0 20px #ff00ab;
            animation: float 6s linear infinite;
            opacity: 0.6;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        /* Cartão Neon */
        .card {
            background: rgba(20, 20, 20, 0.8);
            padding: 3rem;
            border-radius: 30px;
            border: 2px solid #ff00ab;
            box-shadow: 0 0 20px #ff00ab, inset 0 0 15px #ff00ab;
            text-align: center;
            backdrop-filter: blur(5px);
            z-index: 1;
        }

        h1 {
            color: #fff;
            font-size: 3.5rem;
            margin: 0;
            text-transform: uppercase;
            /* Efeito Neon */
            text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #ff00ab, 0 0 30px #ff00ab, 0 0 40px #ff00ab;
            animation: pulse 1.5s infinite alternate;
        }

        p {
            color: #ffccff;
            font-size: 1.4rem;
            margin-top: 15px;
            font-weight: bold;
            text-shadow: 0 0 5px #ff6bdf;
        }

        .emoji {
            font-size: 5rem;
            display: block;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px #ff00ab);
        }

        @keyframes pulse {
            from { transform: scale(1); text-shadow: 0 0 10px #fff, 0 0 20px #ff00ab; }
            to { transform: scale(1.05); text-shadow: 0 0 20px #fff, 0 0 40px #ff00ab; }
        }
    </style>
</head>
<body>

    <div class="background-hearts" id="hearts-container"></div>

    <div class="card">
        <span class="emoji">💖</span>
        <h1>VAI TOMAR NO CU</h1>
        <p>você é chata pra caralho ✨</p>
    </div>

    <script>
        // Gerador de corações aleatórios
        const container = document.getElementById('hearts-container');
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
            heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
            container.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 6000);
        }
        setInterval(createHeart, 300);
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engaja Elite</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0a0a0a;
    color: #fff;
    overflow: hidden;
}

/* CENTRALIZAÇÃO */
.wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
}

/* LOADER */
.loader {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
    flex-direction: column;
    animation: sumir 1s ease forwards;
    animation-delay: 2.5s;
}

.loader h1 {
    letter-spacing: 6px;
    font-size: 18px;
    animation: glow 2s ease-in-out infinite;
}

@keyframes glow {
    0%,100% { opacity: 0.4; }
    50% { opacity: 1; text-shadow: 0 0 15px gold; }
}

@keyframes sumir {
    to {
        opacity: 0;
        visibility: hidden;
    }
}

/* ENTRADA CINEMATOGRÁFICA */
.container {
    text-align: center;
    background: rgba(17,17,17,0.9);
    padding: 40px;
    border-radius: 20px;
    max-width: 350px;
    width: 90%;

    opacity: 0;
    transform: scale(0.9) translateY(30px);
    filter: blur(10px);

    animation: entrada 1.5s ease forwards;
    animation-delay: 2.7s;
}

@keyframes entrada {
    to {
        opacity: 1;
        transform: scale(1) translateY(0);
        filter: blur(0);
    }
}

/* BOTÕES */
.btn {
    position: relative;
    display: block;
    padding: 15px;
    margin: 15px 0;
    border-radius: 14px;
    text-decoration: none;
    color: #fff;
    font-weight: bold;
    background: #111;
    overflow: hidden;
}

/* BORDA NEON 360 */
.btn::before {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 16px;
    animation: girar 4s linear infinite;
    z-index: -1;
}

.btn::after {
    content: "";
    position: absolute;
    inset: 2px;
    background: #111;
    border-radius: 12px;
    z-index: -1;
}

@keyframes girar {
    100% { transform: rotate(360deg); }
}

/* IMPÉRIO (OURO) */
.imperio::before {
    background: conic-gradient(transparent, gold, #ffd700, gold, transparent);
}

.imperio:hover {
    box-shadow: 0 0 25px gold;
    transform: scale(1.05);
}

/* DIAMOND (BRANCO) */
.diamond::before {
    background: conic-gradient(transparent, #fff, #ccc, #fff, transparent);
}

.diamond:hover {
    box-shadow: 0 0 25px #fff;
    transform: scale(1.05);
}

/* TEXTO */
h2 { letter-spacing: 2px; }
p { color: #aaa; }

.footer {
    font-size: 12px;
    color: #777;
    margin-top: 10px;
}
</style>
</head>

<body>

<!-- LOADER -->
<div class="loader">
    <h1>entrar</h1></h1>
</div>

<!-- CONTEÚDO -->
<div class="wrapper">
    <div class="container">
        <h2>👑 ENGAJA ELITE</h2>
        <p>Acesso ao crescimento de alto nível</p>

        <a class="btn imperio" href="https://chat.whatsapp.com/BoAkDPaMuJG0VwU2vrlkWU?mode=gi_t" target="_blank">
            🔱 ENGAJA IMPÉRIO
        </a>

        <a class="btn diamond" href="https://chat.whatsapp.com/LwMSLguzrxCDD9lrpl3bC4" target="_blank">
            💎 ENGAJA DIAMOND
        </a>

        <div class="footer">
            Exclusivo • Premium • Limitado
        </div>
    </div>
</div>

</body>
</html>

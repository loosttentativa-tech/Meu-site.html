<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surpresa!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Corações de fundo */
        .background-hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .heart {
            position: absolute;
            color: #ff6bdf;
            text-shadow: 0 0 10px #ff6bdf;
            animation: float 5s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(110vh) scale(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* Cartão Principal */
        .card {
            background: rgba(15, 15, 15, 0.9);
            padding: 2.5rem;
            border-radius: 30px;
            border: 2px solid #ff00ab;
            box-shadow: 0 0 20px #ff00ab;
            text-align: center;
            backdrop-filter: blur(8px);
            max-width: 90%;
        }

        h1 {
            color: #fff;
            font-size: 2.8rem;
            margin: 0;
            text-shadow: 0 0 10px #ff00ab, 0 0 20px #ff00ab;
        }

        /* Botão Roxo Neon */
        .btn-mentira {
            background: transparent;
            color: #fff;
            border: 2px solid #bc13fe;
            padding: 12px 30px;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            box-shadow: 0 0 15px #bc13fe;
            transition: all 0.3s ease;
            margin-top: 25px;
        }

        .btn-mentira:hover {
            background: #bc13fe;
            box-shadow: 0 0 30px #bc13fe;
            transform: scale(1.05);
        }

        /* Efeito de "Nova Aba" (Overlay) */
        #nova-aba {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            animation: fadeIn 0.3s ease;
        }

        .aba-content {
            text-align: center;
            border: 2px solid #ff4757;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 40px #ff4757;
        }

        .aba-content h2 {
            color: #ff4757;
            font-size: 3rem;
            text-shadow: 0 0 20px #ff4757;
            margin: 0;
        }

        .btn-fechar {
            margin-top: 20px;
            background: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="background-hearts" id="hearts-container"></div>

    <div class="card">
        <span style="font-size: 4rem;">💖</span>
        <h1>VAI TOMAR NO CU</h1>
        <p style="color: #ffccff; font-weight: bold;">você é chata pra caralho ✨</p>
        
        <button class="btn-mentira" onclick="abrirAba()">Não sou chata</button>
    </div>

    <div id="nova-aba">
        <div class="aba-content">
            <h2>VOCÊ É CHATA SIM! 🙄</h2>
            <p style="color: white;">Não adianta tentar negar.</p>
            <button class="btn-fechar" onclick="fecharAba()">Aceitar a verdade</button>
        </div>
    </div>

    <script>
        function abrirAba() {
            document.getElementById('nova-aba').style.display = 'flex';
        }

        function fecharAba() {
            document.getElementById('nova-aba').style.display = 'none';
        }

        // Corações flutuantes
        const container = document.getElementById('hearts-container');
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
            heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
            container.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }
        setInterval(createHeart, 300);
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engaja Elite</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: #050505;
        overflow: hidden;
        color: #fff;
    }

    /* FUNDO COM BRILHOS */
    .bg {
        position: fixed;
        width: 100%;
        height: 100%;
        overflow: hidden;
        z-index: 0;
    }

    .sparkle {
        position: absolute;
        width: 3px;
        height: 3px;
        background: white;
        border-radius: 50%;
        opacity: 0;
        animation: brilho linear infinite;
    }

    .sparkle.gold {
        background: #ffd700;
        box-shadow: 0 0 8px #ffd700;
    }

    .sparkle.white {
        background: #ffffff;
        box-shadow: 0 0 6px #ffffff;
    }

    @keyframes brilho {
        0% {
            transform: translateY(100vh) scale(0.5);
            opacity: 0;
        }
        20% {
            opacity: 1;
        }
        80% {
            opacity: 1;
        }
        100% {
            transform: translateY(-10vh) scale(1);
            opacity: 0;
        }
    }

    /* CONTEÚDO */
    .container {
        position: relative;
        z-index: 2;
        text-align: center;
        background: rgba(15,15,15,0.85);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 0 40px rgba(0,0,0,0.9);
        max-width: 350px;
        width: 90%;
        margin: auto;
        top: 50%;
        transform: translateY(-50%);
        backdrop-filter: blur(10px);
    }

    h1 {
        letter-spacing: 2px;
    }

    p {
        color: #bbb;
        margin-bottom: 30px;
    }

    .btn {
        display: block;
        text-decoration: none;
        padding: 15px;
        margin: 10px 0;
        border-radius: 12px;
        font-weight: bold;
        transition: 0.3s;
    }

    .imperio {
        background: linear-gradient(45deg, #1a1a1a, #333);
        border: 1px solid #ffd70044;
    }

    .diamond {
        background: linear-gradient(45deg, #111, #222);
        border: 1px solid #ffffff33;
    }

    .btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(255,255,255,0.2);
    }

    .footer {
        margin-top: 20px;
        font-size: 12px;
        color: #777;
    }
</style>
</head>

<body>

<div class="bg" id="bg"></div>

<div class="container">
    <h1>👑 ENGAJA ELITE</h1>
    <p>Acesso restrito ao crescimento de alto nível</p>

    <a class="btn imperio" href="https://chat.whatsapp.com/BoAkDPaMuJG0VwU2vrlkWU?mode=gi_t" target="_blank">
        🔱 ENGAJA IMPÉRIO
    </a>

    <a class="btn diamond" href="https://chat.whatsapp.com/LwMSLguzrxCDD9lrpl3bC4" target="_blank">
        💎 ENGAJA DIAMOND
    </a>

    <div class="footer">
        Exclusivo • Premium • Limitado
    </div>
</div>

<script>
    const bg = document.getElementById('bg');

    function criarBrilho() {
        const brilho = document.createElement('div');
        brilho.classList.add('sparkle');

        const tipo = Math.random() > 0.5 ? 'gold' : 'white';
        brilho.classList.add(tipo);

        brilho.style.left = Math.random() * 100 + 'vw';
        brilho.style.animationDuration = (3 + Math.random() * 5) + 's';
        brilho.style.width = brilho.style.height = (2 + Math.random() * 3) + 'px';

        bg.appendChild(brilho);

        setTimeout(() => {
            brilho.remove();
        }, 8000);
    }

    setInterval(criarBrilho, 120);
</script>

</body>
</html>

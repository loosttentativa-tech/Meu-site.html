<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engaja Elite</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #050505;
    color: #fff;
    overflow: hidden;
}

/* LOADER */
.loader {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
    animation: sumir 2.5s forwards;
}

.loader h1 {
    font-size: 28px;
    letter-spacing: 3px;
    background: linear-gradient(90deg, gold, white, gold);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: brilho 2s linear infinite;
}

@keyframes brilho {
    0% { background-position: 0%; }
    100% { background-position: 200%; }
}

@keyframes sumir {
    80% { opacity: 1; }
    100% { opacity: 0; visibility: hidden; }
}

/* FUNDO */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,215,0,0.08), transparent 60%);
    animation: girarBg 15s linear infinite;
}

@keyframes girarBg {
    100% { transform: rotate(360deg); }
}

/* PARTÍCULAS */
.bg span {
    position: absolute;
    width: 3px;
    height: 3px;
    background: white;
    box-shadow: 0 0 10px gold;
    animation: subir 8s linear infinite;
}

@keyframes subir {
    0% { transform: translateY(100vh); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}

/* CENTRAL */
.wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.container {
    width: 90%;
    max-width: 360px;
    padding: 25px;
    border-radius: 20px;
    background: rgba(20,20,20,0.8);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.05);
    text-align: center;

    animation: entrar 1.5s ease;
}

@keyframes entrar {
    from {
        opacity: 0;
        transform: translateY(60px) scale(0.9);
        filter: blur(15px);
    }
}

/* TABS */
.tabs {
    display: flex;
    margin-bottom: 15px;
}

.tab {
    flex: 1;
    padding: 10px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: 0.3s;
}

.tab.active {
    border-color: gold;
    color: gold;
}

/* CONTEÚDO */
.content { display: none; }
.content.active { display: block; }

<!-- IMAGENS -->
.group-img {
    width: 100%;
    border-radius: 50%; /* ALTERADO */
    margin-bottom: 8px;
    }

/* BOTÕES */
.btn {
    display: block;
    margin: 10px 0 20px;
    padding: 12px;
    border-radius: 12px;
    background: #111;
    color: #fff;
    text-decoration: none;
    position: relative;
    overflow: hidden;
    transition: 0.3s;
}

/* EFEITO 3D */
.btn:hover {
    transform: scale(1.05) translateY(-3px);
}

/* BRILHO PASSANDO */
.btn::before {
    content: "";
    position: absolute;
    width: 60%;
    height: 100%;
    top: 0;
    left: -100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.5), transparent);
    transform: skewX(-20deg);
    transition: 0.5s;
}

.btn:hover::before {
    left: 120%;
}

/* VARIAÇÕES */
.imperio {
    box-shadow: 0 0 10px gold;
}
.imperio:hover {
    box-shadow: 0 0 30px gold;
}

.diamond {
    box-shadow: 0 0 10px white;
}
.diamond:hover {
    box-shadow: 0 0 30px white;
}

/* PARCERIA */
.parceria {
    border: 1px solid gold;
}

/* FOOTER */
.footer {
    font-size: 12px;
    color: #777;
}
</style>
</head>

<body>

<div class="loader">
    <h1>ENGAJA ELITE</h1>
</div>

<div class="bg">
    <span style="left:10%"></span>
    <span style="left:30%"></span>
    <span style="left:60%"></span>
    <span style="left:80%"></span>
</div>

<div class="wrapper">
<div class="container">

    <h2>👑 ENGAJA ELITE</h2>

    <div class="tabs">
        <div class="tab active" onclick="trocar(0)">Grupos</div>
        <div class="tab" onclick="trocar(1)">Parceria</div>
    </div>

    <!-- GRUPOS -->
    <div class="content active">
        <img class="group-img" src="https://storageblack.cloud/midia/1777331201682.jpg">
        <a class="btn imperio" href="#">🔱 ENGAJA IMPÉRIO</a>

        <img class="group-img" src="https://storageblack.cloud/midia/1777330978711.jpg">
        <a class="btn diamond" href="#">💎 ENGAJA DIAMOND</a>
    </div>

<!-- PARCERIA -->
<div class="content">
    <p>Quer crescer junto com a Elite?</p>
    <a class="btn parceria" href="https://wa.me/557588379574" target="_blank">
        🤝 Falar comigo
    </a>
</div>

    <div class="footer">by: ẉa.me/marcos '                    </>                    </div>

</div>
</div>

<script>
function trocar(i){
    let tabs = document.querySelectorAll(".tab");
    let content = document.querySelectorAll(".content");

    tabs.forEach(t => t.classList.remove("active"));
    content.forEach(c => c.classList.remove("active"));

    tabs[i].classList.add("active");
    content[i].classList.add("active");
}
</script>

</body>
</html>

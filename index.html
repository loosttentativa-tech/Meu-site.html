<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisador de Chatice Premium ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&family=Bungee&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff00ab;
            --secondary: #bc13fe;
            --cyan: #00f2ff;
            --green: #2ecc71;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; background: radial-gradient(circle at center, #1a0b2e 0%, #050505 100%);
            overflow: hidden; font-family: 'Poppins', sans-serif;
        }

        /* Fundo com efeito de profundidade */
        .background-elements {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: -1;
        }

        .heart {
            position: absolute; pointer-events: none;
            filter: drop-shadow(0 0 8px var(--primary));
            animation: floatUp 4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg) scale(0); opacity: 0; }
            50% { opacity: 0.7; }
            100% { transform: translateY(-20vh) rotate(360deg) scale(1.5); opacity: 0; }
        }

        /* Cartão Glassmorphism Refinado */
        .card {
            background: var(--glass);
            padding: 3rem 2rem; border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(255, 0, 171, 0.1);
            text-align: center; backdrop-filter: blur(25px);
            max-width: 400px; width: 90%;
            animation: cardSlide 1.2s ease-out;
            position: relative;
        }

        @keyframes cardSlide {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        h1 {
            font-family: 'Bungee', cursive;
            color: #fff; font-size: 2.2rem; margin: 10px 0;
            line-height: 1; text-transform: uppercase;
            background: linear-gradient(135deg, #fff 30%, var(--primary), var(--cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 5px 15px rgba(255, 0, 171, 0.4));
        }

        p { color: rgba(255, 255, 255, 0.6); font-size: 0.9rem; margin-bottom: 2rem; }

        .btn-container { display: flex; flex-direction: column; gap: 15px; }

        .btn {
            border: none; border-radius: 20px; padding: 15px;
            font-size: 0.9rem; font-weight: 900; letter-spacing: 1.5px;
            text-transform: uppercase; cursor: pointer; transition: all 0.3s;
            position: relative; overflow: hidden;
        }

        .btn-mentira {
            background: rgba(188, 19, 254, 0.1);
            color: var(--secondary); border: 2px solid var(--secondary);
        }
        .btn-mentira:hover { 
            background: var(--secondary); color: #fff; 
            box-shadow: 0 0 30px var(--secondary); transform: scale(1.05);
        }

        .btn-medidor {
            background: rgba(0, 242, 255, 0.1);
            color: var(--cyan); border: 2px solid var(--cyan);
        }
        .btn-medidor:hover { 
            background: var(--cyan); color: #000; 
            box-shadow: 0 0 30px var(--cyan); transform: scale(1.05);
        }

        .btn-share {
            display: none; background: var(--green); color: #000;
            box-shadow: 0 10px 20px rgba(46, 204, 113, 0.3); margin-top: 20px;
        }

        /* Medidor Estilizado */
        #medidor-container { display: none; margin-top: 30px; }

        .progress-bg {
            width: 100%; height: 16px; background: rgba(255, 255, 255, 0.05);
            border-radius: 30px; overflow: hidden; border: 1px solid rgba(0, 242, 255, 0.2);
        }

        .progress-fill {
            width: 0%; height: 100%; background: linear-gradient(90deg, var(--cyan), var(--secondary));
            box-shadow: 0 0 20px var(--cyan); transition: width 0.1s linear;
        }

        .status-text { 
            color: var(--cyan); font-size: 0.75rem; font-weight: 700; 
            margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;
        }

        #resultado-final {
            display: none; margin-top: 20px; padding: 20px;
            border-radius: 25px; background: rgba(255, 71, 87, 0.15);
            border: 1px solid #ff4757; animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        #valor-sorteado { 
            font-family: 'Bungee'; font-size: 3rem; color: #ff4757; 
            line-height: 1; text-shadow: 0 0 20px #ff4757;
        }

        @keyframes bounceIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Modal Ultra-Blur */
        #nova-aba {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(15px);
        }

        .aba-content {
            background: #000; padding: 50px; border-radius: 40px;
            border: 2px solid #ff4757; text-align: center; box-shadow: 0 0 50px rgba(255, 71, 87, 0.3);
        }
    </style>
</head>
<body>

    <div class="background-elements" id="bg-container"></div>

    <div class="card">
        <div style="font-size: 5rem; margin-bottom: 5px; filter: drop-shadow(0 0 15px var(--primary));">🌸</div>
        <h1>Você é<br>muito chata</h1>
        <p>Diagnóstico científico e imparcial ✨</p>
        
        <div class="btn-container">
            <button class="btn btn-mentira" onclick="abrirAba()">Não sou chata</button>
            <button class="btn btn-medidor" id="btn-m" onclick="iniciarMedidor()">Analisar DNA chato</button>
        </div>

        <div id="medidor-container">
            <div class="status-text" id="status">Aguardando comando...</div>
            <div class="progress-bg">
                <div class="progress-fill" id="fill"></div>
            </div>
            
            <div id="resultado-final">
                <span style="color: #fff; font-size: 0.8rem; font-weight: 700;">NÍVEL DE CHATICE:</span>
                <span id="valor-sorteado">0%</span>
                <p style="color: #ff4757; margin: 5px 0 0; font-weight: 900;">⚠️ PERIGO: CHATICE EXTREMA</p>
            </div>

            <button class="btn btn-share" id="btn-share" onclick="compartilhar()">Compartilhar Resultado 🤡</button>
        </div>
    </div>

    <div id="nova-aba">
        <div class="aba-content">
            <h2 style="color: #ff4757; font-family: 'Bungee'; font-size: 2.5rem; margin: 0;">MENTIRA! 🙄</h2>
            <p style="color: #fff; margin: 15px 0 25px;">O sistema detectou uma negação da realidade.</p>
            <button class="btn btn-medidor" style="padding: 10px 30px;" onclick="fecharAba()">ADMITIR</button>
        </div>
    </div>

    <script>
        let nivelFinal = 0;

        function abrirAba() { document.getElementById('nova-aba').style.display = 'flex'; }
        function fecharAba() { document.getElementById('nova-aba').style.display = 'none'; }

        function iniciarMedidor() {
            const btn = document.getElementById('btn-m');
            btn.disabled = true;
            btn.style.opacity = '0.3';
            btn.style.transform = 'scale(0.9)';

            const container = document.getElementById('medidor-container');
            const fill = document.getElementById('fill');
            const statusText = document.getElementById('status');
            const resultado = document.getElementById('resultado-final');
            const valorFinal = document.getElementById('valor-sorteado');
            const shareBtn = document.getElementById('btn-share');
            
            container.style.display = 'block';
            let width = 0;
            
            const intervalo = setInterval(() => {
                if (width >= 100) {
                    clearInterval(intervalo);
                    statusText.innerHTML = "SYSTEM OVERLOAD: MUITO CHATA!";
                    statusText.style.color = "#ff4757";
                    
                    nivelFinal = Math.floor(Math.random() * (166 - 100 + 1)) + 100;
                    valorFinal.innerHTML = nivelFinal + "%";
                    resultado.style.display = 'block';
                    shareBtn.style.display = 'block';
                } else {
                    width++;
                    fill.style.width = width + '%';
                    if(width < 25) statusText.innerHTML = "Buscando paciência...";
                    else if(width < 50) statusText.innerHTML = "Medindo nível de drama...";
                    else if(width < 75) statusText.innerHTML = "Analisando insistência...";
                    else statusText.innerHTML = "Gerando veredito...";
                }
            }, 50);
        }

        async function compartilhar() {
            const text = `Meu nível de chatice é de ${nivelFinal}%! Não acreditei, faz o teste kkkk 🤡:`;
            const url = window.location.href;
            if (navigator.share) {
                try { await navigator.share({ title: 'Chatice Pro', text: text, url: url }); } 
                catch (err) { }
            } else {
                navigator.clipboard.writeText(`${text} ${url}`);
                alert('Link copiado! Espalhe a sua chatice por aí. 🙄');
            }
        }

        const bg = document.getElementById('bg-container');
        const icons = ['❤️', '💖', '✨', '🌸', '🍭', '🎀'];
        setInterval(() => {
            const p = document.createElement('div');
            p.classList.add('heart');
            p.innerHTML = icons[Math.floor(Math.random() * icons.length)];
            p.style.left = Math.random() * 100 + 'vw';
            p.style.fontSize = (Math.random() * 20 + 10) + 'px';
            const dur = Math.random() * 3 + 3;
            p.style.animation = `floatUp ${dur}s ease-in forwards`;
            bg.appendChild(p);
            setTimeout(() => p.remove(), dur * 1000);
        }, 150);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisador de Chatice Pro ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff00ab;
            --secondary: #bc13fe;
            --cyan: #00f2ff;
        }

        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; background-color: #050505;
            overflow: hidden; font-family: 'Poppins', sans-serif;
        }

        .background-elements {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: -1;
        }

        .heart {
            position: absolute; color: var(--primary);
            text-shadow: 0 0 15px var(--primary);
            animation: floatUp 4s ease-in infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg) scale(0); opacity: 0; }
            100% { transform: translateY(-20vh) rotate(360deg) scale(1.5); opacity: 0; }
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            padding: 2.5rem 1.5rem; border-radius: 40px;
            border: 1px solid rgba(255, 0, 171, 0.3);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center; backdrop-filter: blur(15px);
            max-width: 380px; width: 90%;
            animation: fadeIn 1s ease;
        }

        h1 {
            color: #fff; font-size: 2rem; font-weight: 900;
            background: linear-gradient(to right, #fff, var(--primary), var(--secondary), #fff);
            background-size: 200% auto; -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; animation: shineText 3s linear infinite;
        }

        .btn-container {
            display: flex; flex-direction: column; gap: 15px; margin-top: 25px;
        }

        .btn {
            background: transparent; color: #fff; border-radius: 100px;
            padding: 12px; font-size: 0.85rem; cursor: pointer;
            text-transform: uppercase; font-weight: 700; letter-spacing: 1px;
            transition: 0.4s; outline: none;
        }

        .btn-mentira { border: 2px solid var(--secondary); box-shadow: 0 0 10px var(--secondary); }
        .btn-mentira:hover { background: var(--secondary); box-shadow: 0 0 30px var(--secondary); transform: scale(1.02); }

        .btn-medidor { border: 2px solid var(--cyan); box-shadow: 0 0 10px var(--cyan); color: var(--cyan); }
        .btn-medidor:hover { background: var(--cyan); color: #000; box-shadow: 0 0 30px var(--cyan); transform: scale(1.02); }

        /* Medidor */
        #medidor-container {
            display: none; margin-top: 25px; text-align: left;
        }

        .progress-bg {
            width: 100%; height: 12px; background: rgba(255,255,255,0.1);
            border-radius: 10px; overflow: hidden; margin-top: 10px;
            border: 1px solid rgba(0, 242, 255, 0.3);
        }

        .progress-fill {
            width: 0%; height: 100%; background: var(--cyan);
            box-shadow: 0 0 15px var(--cyan); transition: width 0.1s linear;
        }

        .status-text { color: var(--cyan); font-size: 0.8rem; font-weight: bold; height: 20px; }

        /* Estilo para o número final */
        #resultado-final {
            display: none; margin-top: 15px; padding: 10px;
            border-radius: 15px; background: rgba(255, 71, 87, 0.2);
            border: 1px solid #ff4757; color: #fff;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #valor-sorteado { font-size: 2rem; display: block; color: #ff4757; font-weight: 900; text-shadow: 0 0 10px #ff4757; }

        @keyframes shineText { to { background-position: 200% center; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div class="background-elements" id="bg-container"></div>

    <div class="card">
        <div style="font-size: 4rem; margin-bottom: 10px;">🌸</div>
        <h1>Você é<br>muito chata</h1>
        
        <div class="btn-container">
            <button class="btn btn-mentira" onclick="abrirAba()">Não sou chata</button>
            <button class="btn btn-medidor" id="btn-m" onclick="iniciarMedidor()">Porcentagem de chatice</button>
        </div>

        <div id="medidor-container">
            <div class="status-text" id="status">Iniciando protocolo...</div>
            <div class="progress-bg">
                <div class="progress-fill" id="fill"></div>
            </div>
            
            <div id="resultado-final">
                SEU NÍVEL: <span id="valor-sorteado">0%</span>
                <small id="sub-msg">Insuportável detectada!</small>
            </div>
        </div>
    </div>

    <div id="nova-aba" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:1000; display:none; justify-content:center; align-items:center; backdrop-filter:blur(10px);">
        <div style="background:#111; padding:40px; border-radius:30px; border:2px solid #ff4757; text-align:center;">
            <h2 style="color:#ff4757; font-family:'Poppins';">É CHATA SIM! 🙄</h2>
            <button style="margin-top:20px; padding:10px 20px; font-weight:bold; cursor:pointer;" onclick="fecharAba()">ADMITIR</button>
        </div>
    </div>

    <script>
        function abrirAba() { document.getElementById('nova-aba').style.display = 'flex'; }
        function fecharAba() { document.getElementById('nova-aba').style.display = 'none'; }

        function iniciarMedidor() {
            // Desativar botão após clique
            document.getElementById('btn-m').disabled = true;
            document.getElementById('btn-m').style.opacity = '0.5';
            document.getElementById('btn-m').style.cursor = 'not-allowed';

            const container = document.getElementById('medidor-container');
            const fill = document.getElementById('fill');
            const statusText = document.getElementById('status');
            const resultado = document.getElementById('resultado-final');
            const valorFinal = document.getElementById('valor-sorteado');
            
            container.style.display = 'block';
            let width = 0;
            
            const intervalo = setInterval(() => {
                if (width >= 100) {
                    clearInterval(intervalo);
                    statusText.innerHTML = "ERRO: CAPACIDADE EXCEDIDA!";
                    
                    // Sorteia entre 100 e 166
                    const sorteio = Math.floor(Math.random() * (166 - 100 + 1)) + 100;
                    valorFinal.innerHTML = sorteio + "%";
                    resultado.style.display = 'block';
                    
                    if(sorteio > 150) {
                        document.getElementById('sub-msg').innerHTML = "Nível lendário de chatice! 🏆";
                    }
                } else {
                    width++;
                    fill.style.width = width + '%';
                    
                    if(width < 30) statusText.innerHTML = "Escaneando drama...";
                    else if(width < 60) statusText.innerHTML = "Analisando áudios longos...";
                    else if(width < 90) statusText.innerHTML = "Calculando paciência necessária...";
                    else statusText.innerHTML = "Finalizando diagnóstico...";
                }
            }, 40);
        }

        // Partículas
        const bg = document.getElementById('bg-container');
        const icons = ['❤️', '💖', '✨', '🌸'];
        setInterval(() => {
            const p = document.createElement('div');
            p.classList.add('heart');
            p.innerHTML = icons[Math.floor(Math.random() * icons.length)];
            p.style.left = Math.random() * 100 + 'vw';
            p.style.fontSize = (Math.random() * 15 + 10) + 'px';
            const dur = Math.random() * 3 + 2;
            p.style.animation = `floatUp ${dur}s ease-in forwards`;
            bg.appendChild(p);
            setTimeout(() => p.remove(), dur * 1000);
        }, 250);
    </script>
</body>
</html>

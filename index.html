<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surpresa!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Corações de fundo */
        .background-hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .heart {
            position: absolute;
            color: #ff6bdf;
            text-shadow: 0 0 10px #ff6bdf;
            animation: float 5s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(110vh) scale(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* Cartão Neon */
        .card {
            background: rgba(15, 15, 15, 0.9);
            padding: 2.5rem;
            border-radius: 30px;
            border: 2px solid #ff00ab;
            box-shadow: 0 0 20px #ff00ab;
            text-align: center;
            backdrop-filter: blur(8px);
            max-width: 90%;
        }

        h1 {
            color: #fff;
            font-size: 2.8rem;
            margin: 0;
            text-shadow: 0 0 10px #ff00ab, 0 0 20px #ff00ab;
            animation: pulse 1.5s infinite alternate;
        }

        p {
            color: #ffccff;
            font-size: 1.2rem;
            margin: 15px 0;
            font-weight: bold;
        }

        /* Botão Estilizado */
        .btn-mentira {
            background: transparent;
            color: #fff;
            border: 2px solid #00f2ff;
            padding: 10px 25px;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            box-shadow: 0 0 10px #00f2ff;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .btn-mentira:hover {
            background: #00f2ff;
            color: #000;
            box-shadow: 0 0 30px #00f2ff;
        }

        /* Mensagem de resposta */
        #resposta {
            margin-top: 20px;
            color: #ff4757;
            font-weight: bold;
            font-size: 1.5rem;
            text-shadow: 0 0 10px #ff4757;
            display: none; /* Escondido no início */
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.03); }
        }
    </style>
</head>
<body>

    <div class="background-hearts" id="hearts-container"></div>

    <div class="card">
        <span style="font-size: 4rem;">💖</span>
        <h1>VAI TOMAR NO CU</h1>
        <p>você é chata pra caralho ✨</p>
        
        <button class="btn-mentira" onclick="mentirosa()">Não sou chata</button>
        <div id="resposta">VOCÊ É CHATA SIM! 🙄</div>
    </div>

    <script>
        // Lógica do botão
        function mentirosa() {
            const resp = document.getElementById('resposta');
            resp.style.display = 'block';
            // Faz o texto tremer ao aparecer
            resp.style.animation = 'shake 0.5s ease';
        }

        // Corações voando
        const container = document.getElementById('hearts-container');
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
            heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
            container.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }
        setInterval(createHeart, 300);
    </script>

</body>
</html>

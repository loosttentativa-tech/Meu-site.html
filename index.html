<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engaja Elite</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0a0a0a;
    overflow: hidden;
    color: #fff;
}

/* FUNDO BRILHO */
.sparkles span {
    position: absolute;
    width: 3px;
    height: 3px;
    background: white;
    border-radius: 50%;
    box-shadow: 0 0 10px white, 0 0 20px gold;
    animation: subir 10s linear infinite;
    opacity: 0;
}
@keyframes subir {
    0% { transform: translateY(100vh); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}

/* CONTAINER */
.container {
    position: relative;
    z-index: 1;
    text-align: center;
    background: rgba(17,17,17,0.9);
    padding: 40px;
    border-radius: 20px;
    max-width: 350px;
    width: 90%;
    margin: auto;
    top: 50%;
    transform: translateY(-50%);
}

/* BOTÃO BASE */
.btn {
    position: relative;
    display: block;
    padding: 15px;
    margin: 15px 0;
    border-radius: 14px;
    text-decoration: none;
    color: #fff;
    font-weight: bold;
    letter-spacing: 1px;
    background: #111;
    overflow: hidden;
    z-index: 1;
}

/* BORDA NEON 360 */
.btn::before {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 16px;
    background: conic-gradient(from 0deg, transparent, white, transparent);
    animation: girar 4s linear infinite;
    z-index: -1;
}

.btn::after {
    content: "";
    position: absolute;
    inset: 2px;
    background: #111;
    border-radius: 12px;
    z-index: -1;
}

@keyframes girar {
    100% { transform: rotate(360deg); }
}

/* IMPÉRIO (OURO) */
.imperio::before {
    background: conic-gradient(
        from 0deg,
        transparent,
        gold,
        #ffd700,
        gold,
        transparent
    );
}

.imperio:hover {
    box-shadow: 0 0 25px gold, 0 0 50px rgba(255,215,0,0.5);
    transform: scale(1.05);
}

/* DIAMOND (BRANCO/PRATA) */
.diamond::before {
    background: conic-gradient(
        from 0deg,
        transparent,
        #ffffff,
        #cfcfcf,
        #ffffff,
        transparent
    );
}

.diamond:hover {
    box-shadow: 0 0 25px #fff, 0 0 50px rgba(255,255,255,0.4);
    transform: scale(1.05);
}

/* TEXTO */
h1 { letter-spacing: 2px; }
p { color: #aaa; }

.footer {
    margin-top: 15px;
    font-size: 12px;
    color: #777;
}
</style>
</head>

<body>

<div class="sparkles">
    <span style="left:10%; animation-delay:0s;"></span>
    <span style="left:30%; animation-delay:2s;"></span>
    <span style="left:50%; animation-delay:4s;"></span>
    <span style="left:70%; animation-delay:1s;"></span>
    <span style="left:90%; animation-delay:3s;"></span>
</div>

<div class="container">
    <h1>👑 ENGAJA ELITE</h1>
    <p>Acesso ao crescimento de alto nível</p>

    <a class="btn imperio" href="https://chat.whatsapp.com/BoAkDPaMuJG0VwU2vrlkWU?mode=gi_t" target="_blank">
        🔱 ENGAJA IMPÉRIO
    </a>

    <a class="btn diamond" href="https://chat.whatsapp.com/LwMSLguzrxCDD9lrpl3bC4" target="_blank">
        💎 ENGAJA DIAMOND
    </a>

    <div class="footer">
        Exclusivo • Premium • Limitado
    </div>
</div>

</body>
</html>

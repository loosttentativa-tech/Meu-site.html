<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recado</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: white;
            font-family: 'Arial', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Impede scroll por causa dos emojis */
            position: relative;
        }

        /* Estilo da Frase Central */
        h1 {
            font-size: 4rem;
            text-align: center;
            z-index: 10; /* Garante que a frase fique na frente */
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 15px;
        }

        /* Container dos Emojis */
        .background-emojis {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .emoji {
            position: absolute;
            font-size: 2rem;
            user-select: none;
            animation: move linear infinite;
        }

        /* Animação de movimento */
        @keyframes move {
            from {
                transform: translateY(110vh) rotate(0deg);
            }
            to {
                transform: translateY(-10vh) rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <div class="background-emojis" id="emoji-container"></div>

    <h1>vsfdr Ester</h1>

    <script>
        const container = document.getElementById('emoji-container');
        const emojiCount = 50; // Quantidade de emojis na tela

        for (let i = 0; i < emojiCount; i++) {
            const emoji = document.createElement('div');
            emoji.classList.add('emoji');
            emoji.innerText = '🖕';
            
            // Posição horizontal aleatória
            emoji.style.left = Math.random() * 100 + 'vw';
            
            // Velocidade e delay aleatórios para não subirem todos juntos
            const duration = (Math.random() * 5 + 3) + 's';
            const delay = (Math.random() * 5) + 's';
            
            emoji.style.animationDuration = duration;
            emoji.style.animationDelay = delay;
            
            // Tamanho aleatório para dar profundidade
            emoji.style.fontSize = (Math.random() * 1.5 + 1) + 'rem';
            emoji.style.opacity = Math.random() * 0.7 + 0.3;

            container.appendChild(emoji);
        }
    </script>
</body>
</html>

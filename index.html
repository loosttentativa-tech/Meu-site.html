<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engaja Elite</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0a0a0a;
    color: #fff;
    overflow: hidden;
}

/* FUNDO BRILHO LUXO */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: 0;
}

.bg span {
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: white;
    box-shadow: 0 0 10px white, 0 0 25px gold;
    animation: brilho 8s linear infinite;
    opacity: 0;
}

@keyframes brilho {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}

/* CENTRAL */
.wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    z-index: 1;
    position: relative;
}

/* CARD */
.container {
    text-align: center;
    background: rgba(17,17,17,0.9);
    padding: 30px;
    border-radius: 20px;
    width: 90%;
    max-width: 350px;

    animation: entrada 1.5s ease forwards;
}

@keyframes entrada {
    from {
        opacity: 0;
        transform: scale(0.9) translateY(40px);
        filter: blur(10px);
    }
    to {
        opacity: 1;
        transform: scale(1) translateY(0);
        filter: blur(0);
    }
}

/* IMAGENS */
.group-img {
    width: 100%;
    border-radius: 12px;
    margin-bottom: 10px;
    border: 1px solid #333;
}

/* BOTÕES */
.btn {
    display: block;
    margin: 10px 0 20px;
    padding: 12px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    background: #111;
    position: relative;
    overflow: hidden;
}

/* NEON */
.btn::before {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 14px;
    animation: girar 4s linear infinite;
    z-index: -1;
}

.btn::after {
    content: "";
    position: absolute;
    inset: 2px;
    background: #111;
    border-radius: 10px;
    z-index: -1;
}

@keyframes girar {
    100% { transform: rotate(360deg); }
}

.imperio::before {
    background: conic-gradient(transparent, gold, #ffd700, gold, transparent);
}

.diamond::before {
    background: conic-gradient(transparent, #fff, #ccc, #fff, transparent);
}

/* BOTÃO PARCERIA */
.parceria {
    background: linear-gradient(45deg, #111, #1c1c1c);
    border: 1px solid gold;
}

.parceria:hover {
    box-shadow: 0 0 20px gold;
}

/* TEXTO */
h2 { margin-bottom: 5px; }
p { color: #aaa; font-size: 14px; }

.footer {
    font-size: 12px;
    color: #777;
    margin-top: 10px;
}
</style>
</head>

<body>

<!-- FUNDO -->
<div class="bg">
    <span style="left:10%; animation-delay:0s;"></span>
    <span style="left:20%; animation-delay:2s;"></span>
    <span style="left:30%; animation-delay:4s;"></span>
    <span style="left:40%; animation-delay:1s;"></span>
    <span style="left:50%; animation-delay:3s;"></span>
    <span style="left:60%; animation-delay:5s;"></span>
    <span style="left:70%; animation-delay:2s;"></span>
    <span style="left:80%; animation-delay:4s;"></span>
    <span style="left:90%; animation-delay:1s;"></span>
</div>

<!-- CONTEÚDO -->
<div class="wrapper">
<div class="container">

    <h2>👑 ENGAJA ELITE</h2>
    <p>Crescimento de alto nível</p>

    <!-- GRUPO 1 -->
    <img class="group-img" src="https://storageblack.cloud/midia/1777331201682.jpg" alt="Grupo Império">
    <a class="btn imperio" href="https://chat.whatsapp.com/BoAkDPaMuJG0VwU2vrlkWU?mode=gi_t">
        🔱 ENGAJA IMPÉRIO
    </a>

    <!-- GRUPO 2 -->
    <img class="group-img" src="https://storageblack.cloud/midia/1777330978711.jpg" alt="Grupo Diamond">
    <a class="btn diamond" href="https://chat.whatsapp.com/LwMSLguzrxCDD9lrpl3bC4">
        💎 ENGAJA DIAMOND
    </a>

    <!-- PARCERIA -->
    <a class="btn parceria" href="https://wa.me/SEUNUMEROAQUI">
        🤝 Falar sobre parceria
    </a>

    <div class="footer">
        Exclusivo • Premium • Limitado
    </div>

</div>
</div>

</body>
</html>

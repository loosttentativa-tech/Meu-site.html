<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engaja Elite</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: #0a0a0a;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
    }

    .container {
        text-align: center;
        background: #111;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 0 40px rgba(0,0,0,0.8);
        max-width: 350px;
        width: 90%;
    }

    h1 {
        font-size: 22px;
        letter-spacing: 2px;
        margin-bottom: 10px;
    }

    p {
        font-size: 14px;
        color: #aaa;
        margin-bottom: 30px;
    }

    .btn {
        display: block;
        text-decoration: none;
        padding: 15px;
        margin: 10px 0;
        border-radius: 10px;
        font-weight: bold;
        letter-spacing: 1px;
        transition: 0.3s;
    }

    .imperio {
        background: linear-gradient(45deg, #1a1a1a, #333);
        border: 1px solid #555;
    }

    .diamond {
        background: linear-gradient(45deg, #0f0f0f, #1f1f1f);
        border: 1px solid #777;
    }

    .btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 15px rgba(255,255,255,0.2);
    }

    .footer {
        margin-top: 20px;
        font-size: 12px;
        color: #666;
    }
</style>
</head>

<body>

<div class="container">
    <h1>👑 ENGAJA ELITE</h1>
    <p>Acesso restrito ao crescimento de alto nível</p>

    <a class="btn imperio" href="https://chat.whatsapp.com/BoAkDPaMuJG0VwU2vrlkWU?mode=gi_t" target="_blank">

        💎 ENGAJA DIAMOND
    </a>

    <div class="footer">
        Exclusivo • Premium • Limitado
    </div>
</div>

</body>
</html>
